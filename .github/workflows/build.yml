name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write # needed by the release job

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          # go.sum is not committed yet (generated by `go mod tidy` below);
          # enable the cache after you commit go.mod + go.sum from artifacts.
          cache: false

      - name: Tidy & vet
        run: |
          go mod tidy
          go vet ./...

      - name: Build
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          GOOS=windows GOARCH=amd64 go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o vpnguard.exe ./cmd/vpnguard

      - uses: actions/upload-artifact@v4
        with:
          name: vpnguard-windows-amd64
          path: vpnguard.exe

      # Commit these back to the repo after the first green build to pin
      # dependency versions (then flip `cache: false` -> `true` above).
      - uses: actions/upload-artifact@v4
        with:
          name: go-mod-pinned
          path: |
            go.mod
            go.sum

  tray:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish tray (win-x64, self-contained, single file)
        run: >
          dotnet publish tray/VpnGuard.Tray/VpnGuard.Tray.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish-tray

      - uses: actions/upload-artifact@v4
        with:
          name: vpnguard-tray-windows-x64
          path: publish-tray/VpnGuard.Tray.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, tray]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: vpnguard-windows-amd64

      - uses: actions/download-artifact@v4
        with:
          name: vpnguard-tray-windows-x64

      - name: Assemble release zip
        run: |
          mkdir -p pkg/scripts
          cp vpnguard.exe VpnGuard.Tray.exe pkg/
          cp scripts/*.bat pkg/scripts/ 2>/dev/null || true
          cp README.md pkg/
          cd pkg && zip -r ../VPNGuard-win-x64-${GITHUB_REF_NAME}.zip . && cd ..

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            VPNGuard-win-x64-*.zip
            vpnguard.exe
          generate_release_notes: true
