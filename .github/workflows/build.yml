name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write # needed by the release job

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          # go.sum is not committed yet (generated by `go mod tidy` below);
          # enable the cache after you commit go.mod + go.sum from artifacts.
          cache: false

      - name: Tidy & vet
        run: |
          go mod tidy
          go vet ./...

      - name: Build
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          GOOS=windows GOARCH=amd64 go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o vpnguard.exe ./cmd/vpnguard

      - uses: actions/upload-artifact@v4
        with:
          name: vpnguard-windows-amd64
          path: vpnguard.exe

      # Commit these back to the repo after the first green build to pin
      # dependency versions (then flip `cache: false` -> `true` above).
      - uses: actions/upload-artifact@v4
        with:
          name: go-mod-pinned
          path: |
            go.mod
            go.sum

  tray:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish tray — self-contained (64 MB, ни от чего не зависит)
        run: >
          dotnet publish tray/VpnGuard.Tray/VpnGuard.Tray.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish-tray-full

      - name: Publish tray — lite (~1 MB, нужен .NET 8 Desktop Runtime)
        run: >
          dotnet publish tray/VpnGuard.Tray/VpnGuard.Tray.csproj
          -c Release -r win-x64 --self-contained false
          -p:PublishSingleFile=true
          -o publish-tray-lite

      - uses: actions/upload-artifact@v4
        with:
          name: vpnguard-tray-windows-x64
          path: publish-tray-full/VpnGuard.Tray.exe

      - uses: actions/upload-artifact@v4
        with:
          name: vpnguard-tray-windows-x64-lite
          path: publish-tray-lite/VpnGuard.Tray.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, tray]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: vpnguard-windows-amd64
          path: installer/payload

      - uses: actions/download-artifact@v4
        with:
          name: vpnguard-tray-windows-x64
          path: installer/payload

      - name: Build FULL installer (self-contained, ни от чего не зависит)
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=$env:GITHUB_REF_NAME `
            installer\vpnguard.iss

      - name: Portable FULL zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force pkg | Out-Null
          Copy-Item installer/payload/* pkg/
          Copy-Item README.md pkg/
          Compress-Archive -Path pkg/* -DestinationPath "VPNGuard-portable-win-x64-$env:GITHUB_REF_NAME.zip"

      # ---- LITE: тот же набор, но трей — framework-dependent (~1 МБ) ----
      - uses: actions/download-artifact@v4
        with:
          name: vpnguard-tray-windows-x64-lite
          path: installer/payload   # перезаписываем трей на lite-версию

      - name: Build LITE installer (нужен .NET 8 Desktop Runtime)
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="$env:GITHUB_REF_NAME-lite" `
            /DLite=1 `
            installer\vpnguard.iss

      - name: Portable LITE zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force pkg-lite | Out-Null
          Copy-Item installer/payload/* pkg-lite/
          Copy-Item README.md pkg-lite/
          Compress-Archive -Path pkg-lite/* -DestinationPath "VPNGuard-portable-lite-win-x64-$env:GITHUB_REF_NAME.zip"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/output/VPNGuard-Setup-*.exe
            VPNGuard-portable-win-x64-*.zip
            VPNGuard-portable-lite-win-x64-*.zip
          generate_release_notes: true
